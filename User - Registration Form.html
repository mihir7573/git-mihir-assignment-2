
<html>
<head>
    <title>User Registration Form</title>
</head>
<body>
    
<form method="post" action="submit.html">
    <fieldset>
        <h2>Personal Information</h2>

        <div>
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="full_name"
             placeholder="FirstName_LastName" required>
        </div>

        <div>
            <label for="about">About Yourself:</label>
            <textarea id="about"
                      name="about_yourself" rows="5" cols="50"></textarea>
        </div>

        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"
            minlength="8" required>
        </div>

        <div>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone"  pattern="[0-9]{10}"
                   placeholder="10 digit number" required>
        </div>

        <div>
            <label for="website">Website:</label>
            <input type="url" id="website"
                   name="website">
        </div>

        <div>
            <label>Skills:</label>
            <input type="checkbox" id="html" name="skills" value="HTML" checked>
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label>
        </div>

        <div>
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="Male" checked>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
        </div>

        <div>
            <label for="color">Preferred Color:</label>
            <input type="color" id="color" name="preferred_color"
                   value="#0000ff">
        </div>

        
        <div>
            <label for="number">Experience :</label>
            <input type="number" name="Experience">
        </div>


            <!--<label for="experience">Experience Level:</label>
            <input type="range" id="experience" name="experience"
                   min="0" max="10" step="2">
        -->

        <div>
            <label for="search">Search Interest:</label>
            <input type="search" id="search" name="search_interest">
        </div>

        <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="date_of_birth" max="2005-12-31">
        </div>

        <div>
            <label for="time">Available Time:</label>
            <input type="time" id="time" name="available_time" min="09:00"
                   max="18:30">
        </div>

        <div>
            <label for="joining">Joining Month:</label>
            <input type="month" id="joining" name="joining_month"
                   value="2026-01">
        </div>

        <div>
            <label for="week">Training Week:</label>
            <input type="week" id="week" name="training_week"value="2026-W07"readonly>
        </div>

        <div>
            <label for="interview">Interview Slot:</label>
            <input type="datetime-local" id="interview" name="interview_slot">
        </div>
        <div>
            <label for="technology">Technology:</label>
            <select id="technology" name="technology">
                <option value=".Net">.Net</option>
                <option value="Angular">Angular</option>
                <option value="Java">Java</option>
                <option value="ReactJS">ReactJS</option>
                <option value="QA">QA</option>
            </select>
        </div>

        <div>
            <label for="resume">Resume Upload:</label>
            <input type="file"
                   id="resume"
                   name="resume"
                   accept="application/pdf">
        </div>
    

    
    <input type="hidden" name="user_id" value="USR12345">
    <br>

        <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
            <button type="button">Click Me</button>
        </div>
    
    </fieldset>

</form>

</body>
</html>
